name: IPL Ticket Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-tickets:
    name: Check IPL Ticket Changes
    runs-on: ubuntu-latest
    steps:
      - name: Ping endpoint for ticket changes
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET https://ipl-match-tix.vercel.app/ping)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ne 200 ]; then
            echo "::error::Ping failed with status $http_code"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## IPL Ticket Check" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Endpoint**: https://ipl-match-tix.vercel.app/ping" >> $GITHUB_STEP_SUMMARY
